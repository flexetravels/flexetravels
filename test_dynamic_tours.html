<!DOCTYPE html>
<html>
<head>
  <title>Debug Dynamic Tours</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f5f5; }
    .result { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; border-left: 4px solid #0066cc; }
    .error { border-left-color: #ff3333; color: #ff3333; }
    .success { border-left-color: #00cc66; color: #00cc66; }
  </style>
</head>
<body>
  <h1>🧪 Dynamic Tours Debug</h1>
  <div id="debug"></div>

  <script>
    const debug = document.getElementById('debug');
    const log = (msg, type = 'info') => {
      const div = document.createElement('div');
      div.className = `result ${type === 'error' ? 'error' : 'success'}`;
      div.textContent = msg;
      debug.appendChild(div);
    };

    async function test() {
      try {
        log('🔍 Checking if backend is running at http://localhost:8000...', 'info');
        const res = await fetch('http://localhost:8000/api/featured-tours');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        
        log(`✅ API responded successfully!`, 'success');
        log(`📍 Detected Location: ${data.location.city}, ${data.location.country} (IATA: ${data.location.iata_code})`, 'success');
        log(`🎫 Tours returned: ${data.tours.length}`, 'success');
        
        data.tours.forEach((t, i) => {
          log(`  ${i+1}. ${t.title} → ${t.destination} ($${t.price_from})`, 'success');
        });

        log(`✅ FRONTEND TEST: Testing if app.js fetchFeaturedTours() works...`, 'info');
        
        // Simulate the fetch from app.js
        const carousel = document.getElementById('test-carousel');
        if (!carousel) {
          log(`❌ ERROR: Could not find #test-carousel element`, 'error');
          return;
        }
        
        const cards = data.tours.map(t => {
          const badgeClass = t.badge_type === 'ai' ? 'ai-badge' : '';
          return `<div style="border: 1px solid #ccc; padding: 10px; margin: 5px; display: inline-block; width: 250px; background: white;">
            <img src="${t.image_url}" alt="${t.destination}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 4px;">
            <h4>${t.title}</h4>
            <p><strong>${t.destination}</strong>, ${t.country}</p>
            <p>💰 From $${t.price_from}</p>
            <p>${t.tagline}</p>
            <p>⭐ ${t.rating}</p>
          </div>`;
        }).join('');
        
        carousel.innerHTML = cards;
        log(`✅ Successfully rendered ${data.tours.length} dynamic tour cards!`, 'success');
        
      } catch (e) {
        log(`❌ ERROR: ${e.message}`, 'error');
        log(`💡 Make sure backend is running: python3 -m uvicorn main:app --reload --port 8000`, 'error');
      }
    }

    test();
  </script>

  <h2>Test Carousel</h2>
  <div id="test-carousel" style="display: flex; flex-wrap: wrap;"></div>
</body>
</html>
